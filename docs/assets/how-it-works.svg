<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Event-Driven Stock Signal Engine Flow</title>
  <desc id="desc">A compact flow diagram showing public NSE data moving through events, scoring, risk filtering, Telegram alerts, and backtesting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f9ff" />
      <stop offset="100%" stop-color="#eef5ec" />
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f5a7a" />
      <stop offset="100%" stop-color="#12738f" />
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f7a5a" />
      <stop offset="100%" stop-color="#16946d" />
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b4f00" />
      <stop offset="100%" stop-color="#b56c00" />
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b1e3d" />
      <stop offset="100%" stop-color="#a52b53" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .card-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .card-text { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: rgba(255,255,255,0.92); }
      .arrow-label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #166534; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1400" height="420" rx="28" fill="url(#bg)" />

  <text x="60" y="58" class="title">How It Works</text>
  <text x="60" y="88" class="subtitle">Public NSE files become scored stock signals, then pass through risk checks before a Telegram alert is sent.</text>

  <rect x="60" y="130" width="270" height="180" rx="24" fill="url(#cardA)" filter="url(#shadow)" />
  <text x="88" y="178" class="card-title">1. Ingest Data</text>
  <text x="88" y="212" class="card-text">Bhavcopy, bulk deals,</text>
  <text x="88" y="236" class="card-text">sector files, promoter data</text>
  <text x="88" y="274" class="card-text">Store clean OHLCV in SQLite</text>

  <rect x="390" y="130" width="270" height="180" rx="24" fill="url(#cardB)" filter="url(#shadow)" />
  <text x="418" y="178" class="card-title">2. Create Events</text>
  <text x="418" y="212" class="card-text">Volume spike</text>
  <text x="418" y="236" class="card-text">Bulk deal</text>
  <text x="418" y="260" class="card-text">Sector rotation</text>
  <text x="418" y="284" class="card-text">Promoter change</text>

  <rect x="720" y="130" width="270" height="180" rx="24" fill="url(#cardC)" filter="url(#shadow)" />
  <text x="748" y="178" class="card-title">3. Score Signal</text>
  <text x="748" y="212" class="card-text">Deduplicate and merge</text>
  <text x="748" y="236" class="card-text">Apply weights + diversity</text>
  <text x="748" y="260" class="card-text">Boost confidence with rules</text>
  <text x="748" y="284" class="card-text">Push through Redis worker</text>

  <rect x="1050" y="130" width="290" height="180" rx="24" fill="url(#cardD)" filter="url(#shadow)" />
  <text x="1078" y="178" class="card-title">4. Alert and Review</text>
  <text x="1078" y="212" class="card-text">Risk filter checks liquidity,</text>
  <text x="1078" y="236" class="card-text">volatility, market regime, expiry</text>
  <text x="1078" y="274" class="card-text">Send Telegram alert and</text>
  <text x="1078" y="298" class="card-text">later backtest 3d, 5d, 10d returns</text>

  <line x1="330" y1="220" x2="390" y2="220" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="660" y1="220" x2="720" y2="220" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="990" y1="220" x2="1050" y2="220" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)" />

  <text x="346" y="200" class="arrow-label">detect</text>
  <text x="676" y="200" class="arrow-label">score</text>
  <text x="1008" y="200" class="arrow-label">qualify</text>

  <rect x="60" y="338" width="1280" height="42" rx="18" fill="#ffffff" opacity="0.88" />
  <text x="86" y="365" class="note">End-of-day pipeline:</text>
  <text x="230" y="365" class="small">market closes -> files arrive -> engine runs -> qualified signals are alerted -> alerted signals are backtested later</text>
</svg>
